name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  install-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      # Make Git Bash's `ln -s` create real Windows symlinks (fail if it can't),
      # matching the symlinking behaviour the installer relies on. GitHub's
      # Windows runners are elevated, so native symlinks are permitted.
      MSYS: winsymlinks:nativestrict
    steps:
      - uses: actions/checkout@v4

      # jq is preinstalled on all three GitHub-hosted runner images; the
      # installer exits early with a clear message if it is ever missing.
      - name: Run installer tests
        shell: bash
        run: bash tests/test_install.sh

  overnight-tests:
    # Linux-only: this test sources tools/run-overnight.sh (which shells out to
    # python3 and awk with GNU-style regex quantifiers at source time, not just
    # when invoked) and fabricates worker-*.log fixtures with bash-specific
    # constructs. That mix isn't proven portable to the Windows Git Bash runner
    # (e.g. plain `python3` on PATH is not guaranteed there), so this runs as
    # its own ubuntu-only job rather than a step in the install-tests matrix,
    # to avoid spurious failures on macos/windows unrelated to the actual bug
    # this test guards against.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run overnight-runner tests
        shell: bash
        run: bash tests/test_run_overnight.sh
