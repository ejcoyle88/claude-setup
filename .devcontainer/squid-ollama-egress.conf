# Domain/SNI-scoped forwarding egress proxy for the ollama sidecar.
# Built into Dockerfile.egress-proxy; not meant to run anywhere else.
#
# WHY THIS EXISTS: iptables/ipset (ollama-init-firewall.sh) can only match
# destination IP, not the hostname a client actually asked for. Both
# registry.ollama.ai and the *.r2.cloudflarestorage.com hosts `ollama pull`
# redirects blob downloads to are Cloudflare-anycast, so their resolved IPs
# are shared with unrelated Cloudflare tenants -- an IP-allowlist for them
# would really allow "this Cloudflare edge", not "this domain". See
# ollama-init-firewall.sh for how ollama's own network namespace reaches
# this proxy, and docker-compose.yml for how ollama is pointed at it
# (HTTPS_PROXY).
#
# TWO LAYERS OF HOST ENFORCEMENT (Review Round 1 finding C -- a CONNECT-line
# check ALONE is not enough, and an earlier version of this comment claimed
# otherwise; that claim was wrong and is corrected here):
#
#   Layer 1 (http_access below): matches the hostname asserted in the
#   CONNECT request line itself (e.g. "CONNECT registry.ollama.ai:443"),
#   before any TLS bytes are read. Cheap, but a compromised ollama could
#   send a truthful CONNECT line to pass this check, then send a TLS
#   ClientHello with a DIFFERENT SNI for some other Cloudflare-fronted
#   domain sharing the same anycast edge (domain fronting) -- a plain
#   "splice everything past an allowed CONNECT" config would tunnel those
#   bytes without ever looking at the real SNI, defeating the entire point
#   of this proxy.
#
#   Layer 2 (ssl_bump below): peeks the actual TLS ClientHello to learn
#   the REAL SNI, then only splices (raw TCP tunnel, no decryption) if that
#   real SNI is also on the allowlist -- otherwise the connection is
#   terminated. This is the layer that actually closes the domain-fronting
#   gap; layer 1 is defense in depth, not the real boundary.
#
# Neither layer terminates/decrypts ALLOWED traffic: "bump" (the ssl_bump
# action that would actually MITM a connection) is never used below --
# only peek/splice/terminate -- so no certificate is ever presented to a
# real client and no CA needs to be generated, distributed, or trusted
# anywhere for this to work. See the http_port line's comment for the one
# unrelated, config-plumbing reason a placeholder cert/key still has to
# exist on disk.

# KNOWN LIMITATION (Review Round 2 finding W1) -- the .r2.cloudflarestorage.com
# entry below is a SUFFIX WILDCARD, not an exact hostname like
# registry.ollama.ai is. R2 hosts are <account-id>.r2.cloudflarestorage.com,
# and R2 accounts/buckets are Cloudflare self-service -- anyone, including
# an attacker, can stand one up in minutes. So this ACL does not provably
# restrict egress to "ollama's own blob storage"; it restricts it to "any
# R2 tenant, including one created five minutes ago" -- both allowed_dst
# (CONNECT-line) and allowed_sni (real SNI, see the ssl_bump block below)
# match the bare suffix, so a compromised ollama could CONNECT to
# <attacker-account>.r2.cloudflarestorage.com, pass BOTH layers, and get a
# raw spliced tunnel to an attacker-controlled bucket -- an exfil channel.
# This is, one layer down, the exact "shares infrastructure with unrelated
# tenants" problem this whole proxy exists to eliminate for
# registry.ollama.ai; it has NOT been eliminated for the R2 leg.
#
# Multiple independent, third-party bug reports (ollama/ollama GitHub
# issues #3594, #9320, #10151, spanning roughly two years) show ollama's
# blob redirects consistently landing on the SAME account id --
# dd20bb891979d25aebc8bec07b2b3bbc.r2.cloudflarestorage.com -- which is
# suggestive of one stable, ollama-owned R2 account rather than a
# genuinely rotating one. That said, this is circumstantial evidence from
# third-party issue reports, not something confirmed by directly observing
# a live `ollama pull`'s redirect Location header (no docker/outbound
# access to do that from the sandbox this was authored in) or committed to
# as stable by ollama's own docs. Narrowing this ACL to that one hostname
# on unverified evidence risks a WORSE failure mode than this one --
# `ollama pull` breaking outright the moment ollama rotates or
# load-balances across additional R2 accounts -- so the suffix wildcard is
# kept deliberately, not narrowed on a guess. This is a real, accepted,
# TRACKED residual gap in "deny-by-default with an explicit allowlist" for
# the R2 leg specifically (registry.ollama.ai does not share it: both ACLs
# match that one exactly, not a suffix). Confirming a stable hostname set
# by directly observing pull redirects, then narrowing both ACL lines
# below to it, is a good, low-risk follow-up; widening the ipset-based
# iptables layer in ollama-init-firewall.sh instead of this ACL is not, for
# the same anycast-IP-sharing reason this whole proxy exists.
acl allowed_dst dstdomain registry.ollama.ai .r2.cloudflarestorage.com
acl allowed_sni ssl::server_name registry.ollama.ai .r2.cloudflarestorage.com
acl SSL_ports port 443
acl CONNECT method CONNECT
acl step1 at_step SslBump1

# Layer 1 -- CONNECT-line check (defense in depth; see note above):
#   1. This proxy only ever tunnels HTTPS (CONNECT) -- ollama's own FAQ
#      says not to set HTTP_PROXY for it, and we don't (see
#      docker-compose.yml), so there's no legitimate plain-HTTP use here.
#   2. CONNECT is only ever allowed to port 443.
#   3. CONNECT is only ever allowed to the explicit host ACL above.
#   4. Final explicit deny -- fail closed if none of the allows above hit.
http_access deny !CONNECT
http_access deny CONNECT !SSL_ports
http_access deny CONNECT !allowed_dst
http_access allow CONNECT
http_access deny all

# Layer 2 -- the real enforcement: peek the TLS ClientHello (this alone
# does not commit to bumping -- splicing is still possible after peeking),
# then splice (become a raw, undecrypted TCP tunnel) ONLY if the real SNI
# just learned from that ClientHello is on the allowlist; otherwise
# terminate the connection outright instead of falling through to any
# default-allow behavior.
ssl_bump peek step1
ssl_bump splice allowed_sni
ssl_bump terminate all

# ssl-bump mode requires SOME tls-cert/tls-key pair so Squid can
# initialize the TLS engine on this listening socket at all (per Squid's
# own http_port docs: "In addition to [ssl-bump options], ssl-bump
# requires TLS/SSL options") -- that is a config-plumbing requirement of
# the ssl-bump codepath, NOT a MITM certificate. With
# generate-host-certificates=off and "bump" never used as an action above,
# this keypair is never presented to, or trusted by, any real client --
# it's a throwaway self-signed pair generated at build time (see
# Dockerfile.egress-proxy) solely to satisfy that startup requirement.
http_port 3128 ssl-bump generate-host-certificates=off tls-cert=/etc/squid/ssl_cert/placeholder-cert.pem tls-key=/etc/squid/ssl_cert/placeholder-key.pem

# Squid resolves its own FQDN at startup and fatally aborts if it can't --
# which it can't, from a container's random non-resolvable hostname.
# Pin a literal instead of relying on hostname resolution.
visible_hostname ollama-egress-proxy

# This proxy exists to gate egress by hostname, not to cache multi-gigabyte
# model blobs (or anything else) in memory or on disk.
cache deny all

# Don't advertise this box's internals (Via/X-Forwarded-For) upstream.
via off
forwarded_for delete

# Log to stdout (`docker compose logs ollama-egress-proxy`) rather than a
# log file this non-root container has no need to own/rotate.
access_log stdio:/dev/stdout
cache_log stdio:/dev/stdout
cache_store_log none

# No PID file: this runs as PID 1 in the foreground under Compose (-N in
# Dockerfile.egress-proxy's ENTRYPOINT); nothing else on the box needs to
# find it by PID file, and the non-root user this runs as has no
# guaranteed write access to /run anyway.
pid_filename none

# Redirect an on-crash coredump to /tmp (world-writable) instead of the
# packaged default (/var/spool/squid, owned by the packaged `proxy` user,
# not the `egressproxy` user this actually runs as -- see
# Dockerfile.egress-proxy). Best-effort debugging aid only.
coredump_dir /tmp
