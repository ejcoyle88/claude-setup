# Domain/SNI-scoped forwarding egress proxy for the ollama sidecar.
# Built into Dockerfile.egress-proxy; not meant to run anywhere else.
#
# WHY THIS EXISTS: iptables/ipset (ollama-init-firewall.sh) can only match
# destination IP, not the hostname a client actually asked for. Both
# registry.ollama.ai and the *.r2.cloudflarestorage.com hosts `ollama pull`
# redirects blob downloads to are Cloudflare-anycast, so their resolved IPs
# are shared with unrelated Cloudflare tenants -- an IP-allowlist for them
# would really allow "this Cloudflare edge", not "this domain". See
# ollama-init-firewall.sh for how ollama's own network namespace reaches
# this proxy, and docker-compose.yml for how ollama is pointed at it
# (HTTPS_PROXY).
#
# TWO LAYERS OF HOST ENFORCEMENT (Review Round 1 finding C -- a CONNECT-line
# check ALONE is not enough, and an earlier version of this comment claimed
# otherwise; that claim was wrong and is corrected here):
#
#   Layer 1 (http_access below): matches the hostname asserted in the
#   CONNECT request line itself (e.g. "CONNECT registry.ollama.ai:443"),
#   before any TLS bytes are read. Cheap, but a compromised ollama could
#   send a truthful CONNECT line to pass this check, then send a TLS
#   ClientHello with a DIFFERENT SNI for some other Cloudflare-fronted
#   domain sharing the same anycast edge (domain fronting) -- a plain
#   "splice everything past an allowed CONNECT" config would tunnel those
#   bytes without ever looking at the real SNI, defeating the entire point
#   of this proxy.
#
#   Layer 2 (ssl_bump below): peeks the actual TLS ClientHello to learn
#   the REAL SNI, then only splices (raw TCP tunnel, no decryption) if that
#   real SNI is also on the allowlist -- otherwise the connection is
#   terminated. This is the layer that actually closes the domain-fronting
#   gap; layer 1 is defense in depth, not the real boundary.
#
# Neither layer terminates/decrypts ALLOWED traffic: "bump" (the ssl_bump
# action that would actually MITM a connection) is never used below --
# only peek/splice/terminate -- so no certificate is ever presented to a
# real client and no CA needs to be generated, distributed, or trusted
# anywhere for this to work. See the http_port line's comment for the one
# unrelated, config-plumbing reason a placeholder cert/key still has to
# exist on disk.

# KNOWN LIMITATION (Review Round 2 finding W1; re-verified against ollama's
# own source, see below) -- the .r2.cloudflarestorage.com entry below is a
# SUFFIX WILDCARD, not an exact hostname like registry.ollama.ai is. R2
# hosts are <account-id>.r2.cloudflarestorage.com, and R2 accounts/buckets
# are Cloudflare self-service -- anyone, including an attacker, can stand
# one up in minutes. So this ACL does not provably restrict egress to
# "ollama's own blob storage"; it restricts it to "any R2 tenant, including
# one created five minutes ago" -- both allowed_dst (CONNECT-line) and
# allowed_sni (real SNI, see the ssl_bump block below) match the bare
# suffix, so a compromised ollama could CONNECT DIRECTLY to
# <attacker-account>.r2.cloudflarestorage.com -- no redirect from the real
# registry involved at all -- pass BOTH layers, and get a raw spliced
# tunnel to an attacker-controlled bucket -- an exfil channel. This is, one
# layer down, the exact "shares infrastructure with unrelated tenants"
# problem this whole proxy exists to eliminate for registry.ollama.ai; it
# has NOT been eliminated for the R2 leg. This exfil path does not depend
# in any way on how well or poorly ollama's own redirect handling is
# implemented -- a compromised process can simply open the CONNECT itself;
# see the "outbound vs. inbound" note below for why the redirect-handling
# code read isn't itself evidence about this risk.
#
# This was originally backed only by circumstantial evidence (three
# third-party ollama/ollama GitHub issues showing redirects landing on one
# account id). That has since been supplemented by reading ollama's actual
# pull/download code (github.com/ollama/ollama @ 964ea42c, 2026-07-03) --
# the wildcard is being kept, informed by that reading:
#
#   - server/download.go's blobDownload.run() (the classic pull path) GETs
#     the registry's OWN blob endpoint (opts.n.BaseURL() +
#     "/v2/<namespace>/<model>/blobs/<digest>", built at download.go:497-498)
#     and then treats whatever comes back in the HTTP "Location" header of a
#     307 response (resp.Location(), download.go:268) as the "direct URL"
#     used for every subsequent chunk GET (downloadChunk, download.go:331+).
#     Its only redirect check, CheckRedirect (download.go:240-254), governs
#     whether the client keeps auto-following FURTHER redirects that share
#     the prior hop's hostname -- it does not validate the final redirect
#     target against any expected host/domain at all. The first
#     cross-host hop is accepted unconditionally (http.ErrUseLastResponse,
#     download.go:253) and its Location value is used as-is.
#   - The newer chunked-transfer client, server/internal/client/ollama's
#     Registry (chunksums iterator, registry.go:843-933), does the same
#     thing via a different header: it GETs
#     "<registry-host>/v2/<namespace>/<model>/chunksums/<digest>" and reads
#     the destination straight out of the response's "Content-Location"
#     header (registry.go:894), using it verbatim as `blobURL` for every
#     chunk (registry.go:926) -- again with no hardcoded host and no
#     allowlist check.
#   - A repo-wide `grep -rniE "r2\.cloudflarestorage|cloudflare"
#     --include="*.go" .` (note -E and the escaped dot -- a bare `grep
#     "a|b"` without -E/-P treats `|` as a literal character, not
#     alternation, and would silently test nothing) across the full
#     ollama/ollama tree returns ZERO matches. The R2/Cloudflare hostname
#     does not appear anywhere in ollama's own source; it is purely a
#     runtime value the registry's server side (closed, not in this repo)
#     hands back in a Location/Content-Location header for that specific
#     request.
#
# Calibration note on the above: the file:line references and the
# zero-matches grep result are believed accurate as of ollama commit
# 964ea42c (2026-07-03) -- they were checked by fetching that commit's
# source when this note was written, not asserted from memory -- but they
# have not been independently re-verified by every reviewer of this file,
# and ollama's redirect-handling code can change in a later version without
# this comment being updated to match. Treat "code-confirmed" here as
# "confirmed against one specific pinned commit, at the time this was
# written," not as a standing guarantee; re-check against source if the
# vendored/expected ollama version changes materially.
#
# Outbound vs. inbound -- two distinct things, not one confirming the
# other:
#   1. (Inbound, why the ACL must be a wildcard at all) The code above shows
#      ollama's own blob-fetch client applies no pinning or allowlist to
#      the redirect target it's handed -- the real destination is dynamic
#      per-request, decided by the registry's backend, not a fixed host we
#      could hardcode. That's what makes narrowing this ACL to one exact
#      hostname unsafe to do today (see "Narrowing" below) and is why
#      registry.ollama.ai and the R2 leg have to be treated differently.
#   2. (Outbound, the actual exfil concern -- separate from #1) None of the
#      above is evidence for or against the exfil risk described at the top
#      of this block. Even a hypothetically perfect, fully host-validated
#      ollama redirect client would not close it: the risk is a COMPROMISED
#      ollama process opening its own CONNECT straight to an
#      attacker-owned R2 bucket, with no registry redirect involved at all.
#      The wildcard ACL matches on hostname suffix alone and has no way to
#      distinguish "the registry's real redirect target" from "an
#      attacker's own bucket" -- that gap is about what the ACL will match,
#      not about how trustworthy ollama's own redirect-following is.
#
# Conclusion: ollama's blob-fetch redirect target is dynamic, per the
# reading above -- not an open question resolved by guesswork, but also
# not grounds by itself to call the exfil risk closed or narrowed (see
# point 2 just above). The previously-observed "one stable account across
# ~2 years of issues" pattern is an artifact of ollama's server-side
# deployment, not a contract the client enforces, exposes as
# configuration, or that ollama's docs promise as stable API surface.
# Narrowing this ACL to that one observed hostname would mean pinning our
# egress allowlist to unversioned, un-contracted backend behavior that can
# change with zero client-visible signal (no version bump, no changelog --
# just a different header value on an ordinary request), and the failure
# mode of getting that wrong is `ollama pull` breaking outright. So the
# suffix wildcard is kept deliberately, informed by this source reading
# rather than resting on circumstantial issue reports alone -- though, per
# the calibration note above, that reading is pinned to one commit and not
# a standing guarantee. This remains a real, accepted, TRACKED residual gap
# in "deny-by-default with an explicit allowlist" for the R2 leg
# specifically (registry.ollama.ai does not share it: both ACLs match that
# one exactly, not a suffix). If ollama's registry backend ever
# documents/commits to a fixed blob-storage host set, narrowing both ACL
# lines below to it would be the right follow-up; widening the ipset-based
# iptables layer in ollama-init-firewall.sh instead of this ACL is not, for
# the same anycast-IP-sharing reason this whole proxy exists.
acl allowed_dst dstdomain registry.ollama.ai .r2.cloudflarestorage.com
acl allowed_sni ssl::server_name registry.ollama.ai .r2.cloudflarestorage.com
acl SSL_ports port 443
acl CONNECT method CONNECT
acl step1 at_step SslBump1

# Layer 1 -- CONNECT-line check (defense in depth; see note above):
#   1. This proxy only ever tunnels HTTPS (CONNECT) -- ollama's own FAQ
#      says not to set HTTP_PROXY for it, and we don't (see
#      docker-compose.yml), so there's no legitimate plain-HTTP use here.
#   2. CONNECT is only ever allowed to port 443.
#   3. CONNECT is only ever allowed to the explicit host ACL above.
#   4. Final explicit deny -- fail closed if none of the allows above hit.
http_access deny !CONNECT
http_access deny CONNECT !SSL_ports
http_access deny CONNECT !allowed_dst
http_access allow CONNECT
http_access deny all

# Layer 2 -- the real enforcement: peek the TLS ClientHello (this alone
# does not commit to bumping -- splicing is still possible after peeking),
# then splice (become a raw, undecrypted TCP tunnel) ONLY if the real SNI
# just learned from that ClientHello is on the allowlist; otherwise
# terminate the connection outright instead of falling through to any
# default-allow behavior.
ssl_bump peek step1
ssl_bump splice allowed_sni
ssl_bump terminate all

# ssl-bump mode requires SOME tls-cert/tls-key pair so Squid can
# initialize the TLS engine on this listening socket at all (per Squid's
# own http_port docs: "In addition to [ssl-bump options], ssl-bump
# requires TLS/SSL options") -- that is a config-plumbing requirement of
# the ssl-bump codepath, NOT a MITM certificate. With
# generate-host-certificates=off and "bump" never used as an action above,
# this keypair is never presented to, or trusted by, any real client --
# it's a throwaway self-signed pair generated at build time (see
# Dockerfile.egress-proxy) solely to satisfy that startup requirement.
http_port 3128 ssl-bump generate-host-certificates=off tls-cert=/etc/squid/ssl_cert/placeholder-cert.pem tls-key=/etc/squid/ssl_cert/placeholder-key.pem

# Squid resolves its own FQDN at startup and fatally aborts if it can't --
# which it can't, from a container's random non-resolvable hostname.
# Pin a literal instead of relying on hostname resolution.
visible_hostname ollama-egress-proxy

# This proxy exists to gate egress by hostname, not to cache multi-gigabyte
# model blobs (or anything else) in memory or on disk.
cache deny all

# Don't advertise this box's internals (Via/X-Forwarded-For) upstream.
via off
forwarded_for delete

# Log to stdout (`docker compose logs ollama-egress-proxy`) rather than a
# log file this non-root container has no need to own/rotate.
access_log stdio:/dev/stdout
cache_log stdio:/dev/stdout
cache_store_log none

# No PID file: this runs as PID 1 in the foreground under Compose (-N in
# Dockerfile.egress-proxy's ENTRYPOINT); nothing else on the box needs to
# find it by PID file, and the non-root user this runs as has no
# guaranteed write access to /run anyway.
pid_filename none

# Redirect an on-crash coredump to /tmp (world-writable) instead of the
# packaged default (/var/spool/squid, owned by the packaged `proxy` user,
# not the `egressproxy` user this actually runs as -- see
# Dockerfile.egress-proxy). Best-effort debugging aid only.
coredump_dir /tmp
