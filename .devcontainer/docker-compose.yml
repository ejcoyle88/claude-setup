# Claude Code sandbox + OTel sidecar stack.
# Lives in .devcontainer/ next to your existing Dockerfile and init-firewall.sh
# (both unchanged). The devcontainer service is your current container ported
# from devcontainer.json; the sidecars give telemetry somewhere to land.
#
# Firewall interplay: the subnet is PINNED to 172.28.0.0/24 so that
# init-firewall.sh's HOST_NETWORK (the /24 around the default gateway,
# 172.28.0.1) provably covers every sidecar — container→collector traffic is
# allowed by the existing `-d HOST_NETWORK -j ACCEPT` rule, and service-name
# DNS rides the Docker embedded DNS (127.0.0.11) rules the script restores.
# No firewall edits needed. Change the subnet only if it collides with an
# existing Docker network on your machine.

name: claude-sandbox

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-Europe/London}
        CLAUDE_CODE_VERSION: latest
        GIT_DELTA_VERSION: "0.18.2"
        ZSH_IN_DOCKER_VERSION: "1.2.0"
    # runArgs doesn't exist in compose mode — capabilities live here instead.
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Keep the service alive for the devcontainer to attach to.
    command: sleep infinity
    volumes:
      # Compose file sits in .devcontainer/, so the repo root is one level up.
      - ..:/workspace:cached
      - claude-code-bashhistory:/commandhistory
      # Named volume = empty ~/.claude on first run. For the overnight workflow
      # you almost certainly want your real global suite instead — swap for:
      #   - ~/.claude:/home/node/.claude
      # (or a bind of your dotfiles checkout of it).
      - claude-code-config:/home/node/.claude
    environment:
      NODE_OPTIONS: --max-old-space-size=4096
      CLAUDE_CONFIG_DIR: /home/node/.claude
      POWERLEVEL9K_DISABLE_GITSTATUS: "true"
      # Telemetry target: the sidecar, by compose service name. run-overnight.sh
      # and interactive `claude` both inherit this (the script's localhost
      # default only applies when unset).
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest # pin a version once happy
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - loki
    # No host ports needed for the sandbox→collector path. Uncomment to let
    # host-side (non-container) claude sessions export here too:
    # ports:
    #   - "4317:4317"
    #   - "4318:4318"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090" # optional: raw metric spelunking from the host browser

  loki:
    image: grafana/loki:latest
    # Image's default config; Loki 3.x accepts OTLP logs at /otlp out of the
    # box. If log ingest ever 400s, check `allow_structured_metadata` in the
    # Loki config.

  grafana:
    image: grafana/grafana:latest
    environment:
      # Local-only convenience: no login. Don't expose this beyond localhost.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000" # the morning dashboard: http://localhost:3000
    depends_on:
      - prometheus
      - loki

  ollama:
    image: ollama/ollama:latest
    # No host ports: the devcontainer reaches this by service name,
    # ollama:11434, over the pinned 172.28.0.0/24 network that
    # init-firewall.sh's HOST_NETWORK rule already permits — same story as
    # otel-collector above. Model select/pull and the MCP that talks to this
    # sidecar are handled by later beads; this just needs to exist and be
    # reachable.
    #
    # Egress: unlike devcontainer, this service is OUTSIDE init-firewall.sh's
    # allowlist — that script only runs inside the devcontainer service's own
    # network namespace (it's the only service with NET_ADMIN/NET_RAW), so it
    # can't and doesn't constrain ollama's outbound traffic. Ollama currently
    # has unrestricted internet egress. Fine for the ping/health-check use
    # case in this bead; egress hardening for this service must be revisited
    # before the MCP / model-pull beads route real (possibly adversarial)
    # traffic through it.
    volumes:
      - ollama-models:/root/.ollama
    # CPU-only by default on every host, including Docker Desktop / Mac: a
    # `deploy.resources.reservations.devices` block with `driver: nvidia`
    # does NOT silently fall back to CPU when the NVIDIA Container Toolkit
    # is missing — `docker compose up` fails container creation outright
    # ("could not select device driver nvidia"), and with no restart policy
    # the service just sits exited. So the GPU reservation lives on the
    # opt-in `ollama-gpu` service below instead of here, keeping the base
    # stack working everywhere. For the GPU path on a Linux host with the
    # NVIDIA Container Toolkit installed, bring that variant up instead:
    #   docker compose --profile gpu up -d --scale ollama=0 ollama-gpu
    deploy:
      resources:
        limits:
          # Provisional cap for a small instruct model on the shared stack
          # (devcontainer + 5 sidecars) — a model load with no ceiling can
          # OOM the host and take the devcontainer down with it. Revisit
          # once claude-r30.2 picks the actual model.
          memory: 8g

  # Opt-in GPU variant of the ollama service above (same image/volume/egress
  # posture — see the comments there). Only takes effect on a Linux host
  # with the NVIDIA Container Toolkit installed; gated behind the `gpu`
  # profile so it never runs, and never breaks `docker compose up`, unless
  # explicitly requested.
  ollama-gpu:
    image: ollama/ollama:latest
    profiles: ["gpu"]
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        limits:
          # Same provisional cap as the CPU service — see comment above.
          memory: 8g
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  claude-code-bashhistory:
  claude-code-config:
  ollama-models:

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/24
